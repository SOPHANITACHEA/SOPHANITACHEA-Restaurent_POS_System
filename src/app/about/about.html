<div class="container mt-5 mb-5">
    <h1 class="text-center text-primary fw-bold mb-4">Contact Us</h1>
    <div class="row">
      <!-- Contact Form -->
      <div class="col-md-6">
        <div class="card shadow-sm p-4">
          <h4 class="mb-3 text-success"><span class="text">Send us a message</span></h4>
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" placeholder="Your Name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Your Email">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="5" placeholder="Type your message"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
          </form>
        </div>
      </div>
  
      <!-- Contact Info / Map -->
      <div class="col-md-6 mt-4 mt-md-0">
        <div class="card shadow-sm p-4 h-100">
          <h4 class="mb-3 text-success">Our Information</h4>
          <p><strong>Address:</strong> 123 Street, Phnom Penh City</p>
          <p><strong>Phone:</strong> +855 968765433</p>
          <p><strong>Email:</strong> cambodia@burgerhub.com</p>
          <hr>
          <div class="map-responsive">
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d387190.2799141592!2d-74.25987568714018!3d40.697670068373864!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDQxJzQ1LjAiTiA3NMKwMTUnMTcuMCJX!5e0!3m2!1sen!2sus!4v1699752378000!5m2!1sen!2sus" 
              width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </div>
</div>
