<!-- ✅ Navbar -->
<nav *ngIf="showNavbar"
     class="navbar navbar-expand-lg navbar-light bg-white shadow fixed-top"
     style="z-index: 2000;">

  <div class="container-fluid px-4">

    <!-- Brand -->
    <a class="navbar-brand text-success fw-bold fs-3" routerLink="/home">
      REVIVE SV10
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#main_nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav content -->
    <div class="collapse navbar-collapse" id="main_nav">

      <!-- Links -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/home">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/history">History</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/summary">Summary</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/employee">Employee</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/store">Store</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark fw-semibold" routerLink="/about">About</a>
        </li>

      </ul>

      <!-- Search -->
      <form class="d-flex me-3" (submit)="$event.preventDefault()">
        <input class="form-control me-2"
               type="search"
               placeholder="Search drinks...">
        <button class="btn btn-outline-success"
                type="button">
          Search
        </button>
      </form>

      <!-- Icons -->
      <div class="d-flex align-items-center">
        <a class="nav-link position-relative me-3">
          <i class="fa fa-shopping-cart fa-lg text-dark"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            3
          </span>
        </a>

        <a class="nav-link position-relative">
          <i class="fa fa-user-circle fa-lg text-dark"></i>
        </a>
      </div>

    </div>
  </div>
</nav>

<!-- ✅ Page Content -->
<div class="page-body">
  <router-outlet></router-outlet>
</div>
